<!DOCTYPE html>
<html>
<head>

    <title>DOM Playground</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:20px;
        }

        .box{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        }

        input{
            padding:8px;
            width:70%;
        }

        button{
            padding:8px 15px;
        }

        #colorBox{
            height:80px;
            background:gray;
            margin-top:10px;
            margin-bottom:10px;
        }

    </style>

</head>

<body>

    <h1 style="text-align:center;"> DOM Playground</h1>


    <!-- Change Text -->
    <div class="box">

        <h2>Change Text</h2>

        <input type="text" id="textInput" placeholder="Type something">

        <button onclick="changeText()">
            Update
        </button>

        <p id="demo">
            Hello!
        </p>

    </div>


    <!-- Change Background Color -->
    <div class="box">

        <h2>Change Background Color</h2>

        <div id="colorBox"></div>

        <button onclick="redColor()">Red</button>

        <button onclick="blueColor()">Blue</button>

        <button onclick="greenColor()">Green</button>

        <button onclick="resetColor()">Reset</button>

    </div>


    <!-- Todo List -->
    <div class="box">

        <h2>Todo List</h2>

        <input type="text" id="todoInput" placeholder="Add item">

        <button onclick="addItem()">
            Add
        </button>

        <ul id="list"></ul>

    </div>


    <script>

        function changeText(){

            var text =
            document.getElementById("textInput").value;

            document.getElementById("demo").innerHTML =
            text;
        }


        function redColor(){
            document.getElementById("colorBox").style.background =
            "red";
        }

        function blueColor(){
            document.getElementById("colorBox").style.background =
            "blue";
        }

        function greenColor(){
            document.getElementById("colorBox").style.background =
            "green";
        }

        function resetColor(){
            document.getElementById("colorBox").style.background =
            "gray";
        }


        function addItem(){

            var item =
            document.getElementById("todoInput").value;

            var li = document.createElement("li");

            li.innerHTML = item;

            document.getElementById("list").appendChild(li);
        }

    </script>

</body>
</html>
