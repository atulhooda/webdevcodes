<!DOCTYPE html>
<html>
<head>

    <title>Student Report Card</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body{
            background:#f2f2f2;
        }

        header{
            background:navy;
            color:white;
            text-align:center;
            padding:20px;
        }

        section{
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:10px;
        }

    </style>

</head>

<body>

    <!-- Header -->
    <header>

        <h1>ABC COLLEGE</h1>

        <p>Student Report Card</p>

    </header>


    <!-- Main Content -->
    <main class="container">

        <section>

            <!-- Student Details -->
            <table class="table">

                <tr>
                    <td><b>Name:</b> Rahul Sharma</td>
                    <td><b>Semester:</b> IV</td>
                </tr>

                <tr>
                    <td><b>Roll No:</b> 24BCE101</td>
                    <td><b>Course:</b> CSE</td>
                </tr>

            </table>


            <!-- Marks Table -->
            <table class="table table-bordered text-center">

                <tr class="table-dark">
                    <th>Subject</th>
                    <th>Marks</th>
                    <th>Grade</th>
                </tr>

                <tr>
                    <td>Maths</td>
                    <td>95</td>
                    <td>A+</td>
                </tr>

                <tr>
                    <td>Science</td>
                    <td>88</td>
                    <td>A</td>
                </tr>

                <tr>
                    <td>Computer</td>
                    <td>97</td>
                    <td>A+</td>
                </tr>

            </table>


            <!-- Result -->
            <h3 class="text-center text-success">
                PASS
            </h3>

        </section>

    </main>

</body>
</html>
