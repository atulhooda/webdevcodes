<!DOCTYPE html>
<html>
<head>
    <title>Student Report Card</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        table{
            border-collapse: collapse;
            width: 60%;
            margin: auto;
            background-color: white;
        }

        th{
            background-color: navy;
            color: white;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="border:3px solid black; padding:10px;">
        Student Report Card
    </h1>

    <table>
        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>

        <tr>
            <td>Mathematics</td>
            <td>95</td>
            <td style="color:green;">A+</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>88</td>
            <td style="color:green;">A</td>
        </tr>

        <tr>
            <td>English</td>
            <td>82</td>
            <td style="color:blue;">B+</td>
        </tr>

        <tr>
            <td>Computer</td>
            <td>97</td>
            <td style="color:green;">A+</td>
        </tr>
    </table>

</body>
</html>
